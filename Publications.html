---
layout: default
---

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CV</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background-color: white;
    }

    h1 {
      color: #007acc;
      font-size: 18px;
      margin-top: 20px;
    }

    h2 {
      color: #007acc;
      font-size: 16px;
      margin-top: 15px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    ul li {
      margin-bottom: 5px;
    }

    a {
      text-decoration: none;
      color: #007acc;
    }

    .section {
      margin-top: 20px;
      clear: both; /* Add this line to clear floating elements */
    }

    .section-title {
      color: #007acc;
      font-size: 16px;
      margin-top: 10px;
      display: inline-block;
      margin-right: 10px;
    }

    .section-divider {
      background-color: #007acc;
      height: 2px;
      width: 100%;
      display: inline-block;
      margin-top: 6px;
      margin-bottom: 20px;
    }

    .cv-image {
      max-width: 200px;
      height: auto;
      float: left;
      margin-right: 20px;
      margin-top: 10px;
    }

    .experience {
      display: flex;
      margin-bottom: 10px;
    }

    .experience-date {
      flex: 1;
      margin-right: 10px;
    }

    .experience-description {
      flex: 5;
    }

  </style>
